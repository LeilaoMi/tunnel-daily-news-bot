name: node-intel

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点 = 北京时间8点
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASS: ${{ secrets.PASS }}
